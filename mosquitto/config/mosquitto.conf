# Mosquitto Configuration for Development
# WARNING: Anonymous access enabled - DO NOT use in production!

# General Settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# MQTT Listener (default)
listener 1883
allow_anonymous true

# WebSocket Listener (optional, for browser clients)
listener 9001
protocol websockets
allow_anonymous true
